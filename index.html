<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WoW 3D Character Creator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>World of Warcraft 3D Character Creator</h1>
      <p>Pick a race and class, then shape your hero in real-time.</p>
    </header>

    <main>
      <section class="controls" aria-label="Character customization">
        <div class="field-group">
          <label for="factionFilter">Faction</label>
          <select id="factionFilter">
            <option value="All">All</option>
            <option value="Alliance">Alliance</option>
            <option value="Horde">Horde</option>
            <option value="Neutral">Neutral</option>
          </select>
        </div>

        <div class="field-group">
          <label for="raceSelect">Race</label>
          <select id="raceSelect"></select>
        </div>

        <div class="field-group">
          <label for="classSelect">Class</label>
          <select id="classSelect"></select>
        </div>

        <div class="field-group">
          <label for="genderSelect">Gender</label>
          <select id="genderSelect">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Non-binary">Non-binary</option>
          </select>
        </div>

        <div class="field-group slider-row">
          <label for="heightRange">Height</label>
          <input id="heightRange" type="range" min="0.8" max="1.4" step="0.01" value="1" />
        </div>

        <div class="field-group slider-row">
          <label for="bulkRange">Build</label>
          <input id="bulkRange" type="range" min="0.7" max="1.6" step="0.01" value="1" />
        </div>

        <div class="field-group slider-row">
          <label for="headRange">Head Size</label>
          <input id="headRange" type="range" min="0.7" max="1.4" step="0.01" value="1" />
        </div>

        <div class="field-group checkbox-row">
          <label for="hornsToggle">Horns / Tusks</label>
          <input id="hornsToggle" type="checkbox" />
        </div>

        <div class="field-group checkbox-row">
          <label for="pauldronsToggle">Pauldrons</label>
          <input id="pauldronsToggle" type="checkbox" checked />
        </div>

        <div class="field-group color-row">
          <label for="skinColor">Skin</label>
          <input id="skinColor" type="color" value="#c89c7a" />
        </div>

        <div class="field-group color-row">
          <label for="hairColor">Hair</label>
          <input id="hairColor" type="color" value="#20150f" />
        </div>

        <div class="field-group color-row">
          <label for="eyeColor">Eyes</label>
          <input id="eyeColor" type="color" value="#48d0ff" />
        </div>

        <button id="randomizeBtn" type="button">Randomize</button>
      </section>

      <section class="viewport" aria-label="3D character preview">
        <canvas id="viewer"></canvas>
        <aside class="summary" id="summary"></aside>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
